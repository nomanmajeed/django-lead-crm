{% extends "layouts/marketing.html" %}
{% load tailwind_filters %}

{% block title %}Create your workspace · Lead CRM{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-10">
    <div class="mb-6">
        <h1 class="font-display text-3xl font-bold">Create your workspace</h1>
        <p class="text-base-content/70 mt-1">
            Already have an account?
            <a href="{% url 'login' %}" class="link link-primary">Log in</a>
        </p>
    </div>

    <form method="post" class="space-y-4 bg-base-100 p-6 rounded-box border border-base-300">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary w-full">Create organisation</button>
    </form>
</div>
{% endblock %}
