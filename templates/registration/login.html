{% extends "layouts/marketing.html" %}
{% load tailwind_filters %}

{% block title %}Login · Lead CRM{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-10 px-4">
    <div class="mb-6">
        <h1 class="font-display text-3xl font-bold">Welcome back</h1>
        <p class="text-base-content/70 mt-1">
            Don't have an account?
            <a href="{% url 'signup' %}" class="link link-primary">Sign up</a>
        </p>
    </div>

    <form method="post" class="space-y-4 bg-base-100 p-6 rounded-box border border-base-300">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary w-full">Login</button>
    </form>

    <p class="mt-6 text-sm text-base-content/70">
        <a href="{% url 'reset-password' %}" class="link link-hover">Forgot password?</a>
    </p>
</div>
{% endblock content %}
