<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unsubscribed · Lead CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-6">
    <div class="max-w-md w-full border border-base-300 rounded-box bg-base-100 p-6 space-y-3">
        <h1 class="font-bold text-xl">You’re unsubscribed</h1>
        <p class="text-sm text-base-content/70">
            <strong>{{ email }}</strong> will not receive future marketing emails
            {% if organisation %} from {{ organisation.name }}{% endif %}.
        </p>
    </div>
</body>
</html>
