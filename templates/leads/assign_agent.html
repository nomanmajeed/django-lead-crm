{% extends "layouts/app.html" %}

{% block title %}Assign agent · Lead CRM{% endblock %}

{% block content %}
<div class="max-w-md space-y-6">
    <div>
        <h2 class="font-display text-3xl font-bold">Assign agent</h2>
        <p class="text-base-content/70 mt-2">
            Manually assign this lead. This overrides round-robin auto-assign.
        </p>
    </div>

    <form method="post" class="border border-base-300 rounded-box bg-base-100 p-5 space-y-4">
        {% csrf_token %}
        <label class="form-control">
            <span class="label-text">Agent</span>
            {{ form.agent }}
        </label>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm">Assign</button>
            <a href="{% url 'leads:pipeline' %}?agent=unassigned" class="btn btn-ghost btn-sm">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
