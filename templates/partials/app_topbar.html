<div class="navbar bg-base-100 border-b border-base-300 px-2 md:px-4 min-h-14">
    <div class="flex-none lg:hidden">
        <label for="app-drawer" class="btn btn-ghost btn-square btn-sm" aria-label="Open menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </label>
    </div>
    <div class="flex-1">
        <h1 class="text-base font-semibold truncate">{{ topbar_title|default:"Dashboard" }}</h1>
    </div>
    <div class="flex-none gap-2 items-center">
        {% if request.user.is_authenticated %}
        <a href="{% url 'app_notifications' %}" class="btn btn-ghost btn-sm btn-square relative" aria-label="Notifications" title="Notifications">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.4-1.4A2 2 0 0118 14.2V11a6 6 0 10-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5m6 0a3 3 0 11-6 0" />
            </svg>
            {% if notification_unread_count %}
            <span class="badge badge-primary badge-xs absolute -top-1 -right-1">{{ notification_unread_count }}</span>
            {% endif %}
        </a>
        <span class="text-sm text-base-content/70 hidden sm:inline">{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-ghost btn-sm">Logout</a>
        {% endif %}
    </div>
</div>
