<header class="navbar bg-base-100 border-b border-base-300 px-4">
    <div class="flex-1">
        <a href="{% url 'landing_page' %}" class="font-display text-xl font-bold tracking-tight">Lead CRM</a>
    </div>
    <div class="flex-none gap-1">
        {% if request.user.is_authenticated %}
        {% if can_manage %}
        <a href="{% url 'app_home' %}" class="btn btn-ghost btn-sm">Open app</a>
        {% elif is_agent_member %}
        <a href="{% url 'agent_home' %}" class="btn btn-ghost btn-sm">Open workspace</a>
        {% endif %}
        <a href="{% url 'logout' %}" class="btn btn-outline btn-sm">Logout</a>
        {% else %}
        <a href="{% url 'signup' %}" class="btn btn-ghost btn-sm">Signup</a>
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
        {% endif %}
    </div>
</header>
