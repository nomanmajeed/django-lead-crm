{% extends "base.html" %}
{% load static %}

{% block title %}Lead CRM{% endblock %}

{% block content %}
<section class="py-16 md:py-24">
    <div class="flex flex-col items-center text-center gap-8">
        <img class="w-5/6 md:w-2/5 object-cover object-center" alt="Lead CRM"
            src="{% static 'images/landing_page.svg' %}">
        <div class="max-w-2xl space-y-4">
            <p class="font-display text-4xl md:text-5xl font-bold text-base-content tracking-tight">Lead CRM</p>
            <p class="text-base-content/70 text-lg leading-relaxed">
                Manage leads and agents in one place — built for growing sales teams.
            </p>
            <div class="flex justify-center gap-3 pt-2">
                <a href="{% url 'login' %}" class="btn btn-primary">Login to get started</a>
                <a href="{% url 'signup' %}" class="btn btn-ghost">Create account</a>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
