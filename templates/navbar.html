<header class="navbar bg-base-100 border-b border-base-300 mb-4 px-0">
    <div class="flex-1">
        <a href="{% url 'landing_page' %}" class="font-display text-xl font-bold tracking-tight">Lead CRM</a>
    </div>
    <div class="flex-none gap-2">
        <nav class="flex items-center gap-1">
            {% if not request.user.is_authenticated %}
            <a href="{% url 'signup' %}" class="btn btn-ghost btn-sm">Signup</a>
            {% else %}
            {% if request.user.is_organisor %}
            <a href="{% url 'agents:agent_list' %}" class="btn btn-ghost btn-sm">Agents</a>
            {% endif %}
            <a href="{% url 'leads:lead_list' %}" class="btn btn-ghost btn-sm">Leads</a>
            {% endif %}
        </nav>

        {% if request.user.is_authenticated %}
        <span class="text-sm text-base-content/70 hidden sm:inline">{{ request.user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-outline btn-sm">Logout</a>
        {% else %}
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
        {% endif %}
    </div>
</header>
